services:
  fastapi:
    container_name: fastapi_container
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      ./entrypoint.sh 
      --reload-exclude '.git/*' 
      --reload-exclude 'data/*' 
      --reload-exclude '.vscode/*' 
      --reload-exclude '__pycache__/*' 
      --reload-exclude '.pytest_cache/*'
      --reload-exclude 'scratch/*'
    ports:
      - "8080:8080"
    volumes:
      - api_data:/app/data
      - .:/app # used to mount your window volume, so what code is changed, you dont have to rebuild, unless you 

    environment:
      - POPPLER_PATH=/usr/bin


      - MONGODB_HOST=host.docker.internal
      - REDIS_HOST=host.docker.internal
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=fastapi

      - WATCHFILES_FORCE_POLLING=true
      
    # cause redis is not allowing it
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
    env_file:
      - ./.env 
    networks:
      - shared_network


# since we are using our local mongodb and redis, there's no need to create the images
# we render these services useless.
  redis:
    image: alpine:latest
    entrypoint: ["sh", "-c", "echo 'redis skipped' && sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 5s
      timeout: 2s
      retries: 3

  mongodb:
    image: alpine:latest
    entrypoint: ["sh", "-c", "echo 'mongo skipped' && sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
  

  jaeger:
    image: jaegertracing/all-in-one:1.45
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"   # gRPC from otel-collector
    environment:
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - MEMORY_MAX_TRACES=5000
    networks:
      - shared_network

volumes:
  api_data:
  mcp_cache:
  prometheus_data:


networks:
  shared_network:
    external: false
    name: shared_network

